name: CI

on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: anymentor_test
          POSTGRES_USER: anymentor
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Setup test environment
        working-directory: backend
        run: |
          cat > .env << 'EOF'
          NODE_ENV=test
          DATABASE_URL=postgresql://anymentor:test_password@localhost:5432/anymentor_test
          JWT_ACCESS_SECRET=test-access-secret-minimum-32-characters-long-abc
          JWT_REFRESH_SECRET=test-refresh-secret-minimum-32-characters-long-abc
          JWT_ACCESS_EXPIRES=15m
          JWT_REFRESH_EXPIRES=7d
          OWNER_EMAIL=owner@test.com
          OWNER_PASSWORD=TestOwner123!
          EOF

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://anymentor:test_password@localhost:5432/anymentor_test

      - name: Push schema to test DB
        working-directory: backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://anymentor:test_password@localhost:5432/anymentor_test

      - name: Run tests
        working-directory: backend
        run: npm test -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://anymentor:test_password@localhost:5432/anymentor_test
          NODE_ENV: test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: /api/v1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t anymentor-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t anymentor-frontend ./frontend
